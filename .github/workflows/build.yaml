name: Build & publish app images

on:
  push:
    branches: [main]
    paths:
      - "foxess_local/**"
      - ".github/workflows/build.yaml"
  pull_request:
    branches: [main]
    paths:
      - "foxess_local/**"
      - ".github/workflows/build.yaml"
  workflow_dispatch:

# Never let two runs of this workflow overlap on the shared self-hosted
# runners (a new push cancels an in-progress run for the same ref).
concurrency:
  group: build-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: [self-hosted, foxess-add-on]
    permissions:
      contents: read
      packages: write
    # Force the classic docker-driver builder. A leftover docker-container
    # builder (from setup-buildx-action / prior runs) keeps images in the
    # buildx cache only — then home-assistant/builder's `docker tag` fails
    # with "No such image". BUILDX_BUILDER is forwarded into the builder
    # container via its --env-file.
    env:
      BUILDX_BUILDER: default
    strategy:
      # Run the two arches ONE AT A TIME. Both legs land on the same
      # self-hosted runner pool and home-assistant/builder installs+execs
      # cosign at a shared path (~/.cosign/cosign); running them together
      # makes one leg overwrite the binary while the other is executing it,
      # which the kernel rejects with ETXTBSY ("cosign: Text file busy",
      # exit 126). Serializing the matrix removes the race entirely.
      max-parallel: 1
      fail-fast: false
      matrix:
        arch: [aarch64, amd64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU/binfmt so an amd64 runner can also build the aarch64 image.
      # Do NOT add docker/setup-buildx-action — its docker-container driver
      # keeps the image in cache and breaks the builder's tag/push.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # home-assistant/builder mounts ~/.docker as /root/.docker, so prior
      # runs leave root-owned buildx activity files that make plain
      # `docker buildx ls` fail with "permission denied" for gitrunner.
      # Clean that up, select the default docker-driver builder, and drop
      # any leftover container builders.
      - name: Reset buildx to the default docker driver
        run: |
          set +e
          if command -v sudo >/dev/null && sudo -n true 2>/dev/null; then
            sudo rm -rf "${HOME}/.docker/buildx/activity"
            sudo chown -R "$(id -u):$(id -g)" "${HOME}/.docker/buildx" 2>/dev/null
          else
            rm -rf "${HOME}/.docker/buildx/activity" 2>/dev/null
          fi
          set -e

          docker buildx use default

          set +e
          for b in $(docker buildx ls --format '{{.Name}}' 2>/dev/null | grep -v '^default$' || true); do
            docker buildx rm -f "$b" 2>/dev/null
          done
          echo "Active builders:"
          docker buildx ls || true
          set -e

      # Only authenticate when we actually push (i.e. not on pull requests).
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # On PRs, --test builds the image but does NOT push (validation only).
      # On push to main, no --test -> builds AND pushes to GHCR.
      # --addon is required by home-assistant/builder (CLI flag name unchanged).
      - name: Build ${{ matrix.arch }}
        uses: home-assistant/builder@master
        with:
          args: >-
            --${{ matrix.arch }}
            --target foxess_local
            --image "{arch}-foxess_local"
            --docker-hub "ghcr.io/harshbhardwaj"
            --addon
            ${{ github.event_name == 'pull_request' && '--test' || '' }}
